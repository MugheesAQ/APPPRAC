apiVersion: v1
kind: Namespace
metadata:
  name: citizen-portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: citizen-portal
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # Assuming you build the image locally as citizen-portal-frontend:latest
        # Example: docker build -t citizen-portal-frontend:latest ./frontend
        image: citizen-portal-frontend:latest
        imagePullPolicy: Never # Good for local k3s testing using imported images
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: citizen-portal
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: citizen-portal
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # Assuming you build the image locally as citizen-portal-backend:latest
        # Example: docker build -t citizen-portal-backend:latest ./backend
        image: citizen-portal-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: citizen-portal
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citizen-portal-ingress
  namespace: citizen-portal
  annotations:
    # Traefik is the default ingress controller for k3s
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
  - http:
      paths:
      # API routing handled by traefik
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3000
      # Web frontend routing
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
